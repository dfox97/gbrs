<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager - GBRS Services</title>
    <style>
      @font-face { font-family: "Inter"; font-style: normal; font-weight: 500; font-display: swap; src: url("/fonts/web/Inter-Medium.woff2") format("woff2"); }
      @font-face { font-family: "Inter"; font-style: normal; font-weight: 600; font-display: swap; src: url("/fonts/web/Inter-SemiBold.woff2") format("woff2"); }
      @font-face { font-family: "Inter"; font-style: normal; font-weight: 700; font-display: swap; src: url("/fonts/web/Inter-Bold.woff2") format("woff2"); }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #F36F21;
        --primary-dark: #d45a1a;
        --text: #1a1a1a;
        --text-muted: #666;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        width: 100%;
      }

      .card {
        background: var(--card-bg);
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 40px;
        text-align: center;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .logo img {
        width: 48px;
        height: 48px;
        border-radius: 8px;
      }

      .logo-text {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .description {
        color: var(--text-muted);
        margin-bottom: 32px;
        line-height: 1.5;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
        width: 100%;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
      }

      .info {
        margin-top: 24px;
        padding: 16px;
        background: #f0f4ff;
        border-radius: 8px;
        font-size: 14px;
        color: #4a5568;
      }

      .info svg {
        width: 16px;
        height: 16px;
        vertical-align: middle;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="logo">
          <img src="/gbrs_ltd_logo.jpg" alt="GBRS Services Ltd" />
          <span class="logo-text">GBRS Services Ltd</span>
        </div>

        <h1>Content Manager</h1>
        <p class="description">
          Manage your projects and certifications content. 
          Click below to open the CMS.
        </p>

        <a href="https://pagescms.org/" target="_blank" rel="noopener" class="btn btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Open Content Manager
        </a>

        <div class="info">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          You'll be redirected to Pages CMS to edit content. 
          Changes will be saved directly to GitHub.
        </div>
      </div>
    </div>
  </body>
</html>
